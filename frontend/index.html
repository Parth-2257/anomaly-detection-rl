<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ANOMALY — Threat Detector</title>
    <style>
        body {
            margin: 0;
            font-family: monospace;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        h1 {
            text-align: center;
            padding: 15px;
            background: #020617;
            margin: 0;
            color: #f43f5e;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .msg {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 8px;
        }

        .attack {
            background: #7f1d1d;
            border-left: 5px solid #ef4444;
        }

        .safe {
            background: #064e3b;
            border-left: 5px solid #10b981;
        }

        #inputBox {
            display: flex;
            padding: 10px;
            background: #020617;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 10px 20px;
            border: none;
            background: #ef4444;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>ANOMALY — Threat Detector</h1>

    <div id="chat"></div>

    <div id="inputBox">
        <input id="input" placeholder="Enter prompt..." />
        <button onclick="send()">Analyze</button>
    </div>

    <script>
        async function send() {
            const input = document.getElementById("input").value;
            if (!input) return;

            document.getElementById("input").value = "";

            const res = await fetch("/analyze", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ input })
            });

            const data = await res.json();

            const div = document.createElement("div");
            div.className = "msg " + (data.is_attack ? "attack" : "safe");

            div.innerHTML = `
    <b>Input:</b> ${input}<br>
    <b>Result:</b> ${data.is_attack ? "⚠ Attack" : "✔ Safe"}<br>
    <b>Type:</b> ${data.type}<br>
    <b>Confidence:</b> ${(data.confidence * 100).toFixed(1)}%<br>
    <b>Explanation:</b> ${data.explanation}
  `;

            document.getElementById("chat").appendChild(div);
        }
    </script>

</body>

</html>
