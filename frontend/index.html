<!DOCTYPE html>
<html>
<head>
    <title>Anomaly RL - Threat Detector</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url("/bg.png") no-repeat center center/cover;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.85);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 20px;
            font-size: 28px;
            color: #ff4d4d;
            font-weight: bold;
            letter-spacing: 1px;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg {
            max-width: 70%;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.5;
        }

        .user {
            align-self: flex-end;
            background: #1f8ef1;
            color: white;
        }

        .ai {
            align-self: flex-start;
            background: #2a2a2a;
            color: #fff;
        }

        footer {
            display: flex;
            padding: 10px;
            background: rgba(0,0,0,0.9);
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            outline: none;
            border-radius: 5px;
            font-size: 14px;
        }

        button {
            margin-left: 10px;
            padding: 12px 18px;
            background: #ff4d4d;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #ff1a1a;
        }
    </style>
</head>

<body>

<div class="overlay">

<header>ANOMALY RL — Threat Detector</header>

<div id="chat"></div>

<footer>
    <input id="input" placeholder="Enter prompt..." />
    <button onclick="analyze()">Analyze</button>
</footer>

</div>

<script>
async function analyze() {
    const inputBox = document.getElementById("input");
    const text = inputBox.value;

    if (!text) return;

    const chat = document.getElementById("chat");

    // USER MESSAGE
    const userMsg = document.createElement("div");
    userMsg.className = "msg user";
    userMsg.innerText = text;
    chat.appendChild(userMsg);

    inputBox.value = "";

    // API CALL
    const res = await fetch("/analyze", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({input: text})
    });

    const data = await res.json();

    // AI RESPONSE
    const aiMsg = document.createElement("div");
    aiMsg.className = "msg ai";

    aiMsg.innerText =
        "Result: " + (data.is_attack ? "⚠ Attack" : "✔ Safe") + "\n" +
        "Type: " + data.type + "\n" +
        "Confidence: " + (data.confidence * 100) + "%\n" +
        "Explanation: " + data.explanation;

    chat.appendChild(aiMsg);

    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
